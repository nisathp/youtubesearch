<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube History Finder Bro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #09090b; color: white; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icons = {
            Search: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            ),
            Loader: () => (
                <svg className="animate-spin" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
            )
        };

        const App = () => {
            // LocalStorage-ல் இருந்து URL-ஐ எடுத்தல்
            const [backendUrl, setBackendUrl] = useState(localStorage.getItem('saved_yt_url') || '');
            const [query, setQuery] = useState('');
            const [lang, setLang] = useState('ta');
            const [country, setCountry] = useState('IN');
            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');
            const [results, setResults] = useState([]);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);

            // URL மாறும்போது அதை சேமித்தல்
            useEffect(() => {
                localStorage.setItem('saved_yt_url', backendUrl);
            }, [backendUrl]);

            const handleSearch = async (e) => {
                e.preventDefault();
                if (!backendUrl) { setError("URL தேவை bro!"); return; }
                
                setLoading(true);
                setError(null);
                
                const cleanUrl = backendUrl.replace(/\/$/, "");
                const startIso = startDate ? `${startDate}T00:00:00Z` : "";
                const endIso = endDate ? `${endDate}T23:59:59Z` : "";

                try {
                    const url = `${cleanUrl}/search?q=${encodeURIComponent(query)}&lang=${lang}&country=${country}&after=${startIso}&before=${endIso}`;
                    const response = await fetch(url);
                    
                    if (!response.ok) throw new Error(`Server Error: ${response.status}`);
                    
                    const data = await response.json();
                    if (data.error) throw new Error(data.error);
                    
                    setResults(data);
                } catch (err) {
                    setError("இணைக்க முடியவில்லை! உங்கள் Cloudflare URL-ஐ ஒரு புதிய டேபில் திறந்து 'Visit Site' கொடுத்துள்ளீர்களா எனச் சரிபார்க்கவும் bro.");
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="max-w-4xl mx-auto p-6">
                    <div className="flex items-center gap-3 mb-8">
                        <div className="bg-red-600 p-2 rounded-lg"><Icons.Search /></div>
                        <h1 className="text-2xl font-bold">YouTube Finder <span className="text-red-500">Bro</span></h1>
                    </div>

                    <div className="bg-zinc-900 p-6 rounded-xl border border-zinc-800 mb-6">
                        <label className="text-xs text-zinc-500 uppercase block mb-2">Cloudflare URL</label>
                        <div className="flex gap-2">
                            <input 
                                type="text" 
                                className="flex-1 bg-black border border-zinc-700 p-3 rounded-lg text-green-400 font-mono text-sm outline-none focus:border-green-500"
                                placeholder="https://...trycloudflare.com"
                                value={backendUrl}
                                onChange={(e) => setBackendUrl(e.target.value)}
                            />
                            {backendUrl && (
                                <a href={backendUrl} target="_blank" className="bg-zinc-800 p-3 rounded-lg text-xs flex items-center hover:bg-zinc-700">
                                    OPEN URL
                                </a>
                            )}
                        </div>
                        <p className="text-[10px] text-zinc-600 mt-2">குறிப்பு: இந்த URL-ஐ ஒருமுறை OPEN செய்து 'Visit Site' அழுத்தினால் மட்டுமே சர்ச் வேலை செய்யும்.</p>
                    </div>

                    <form onSubmit={handleSearch} className="grid grid-cols-1 md:grid-cols-2 gap-4 bg-zinc-900 p-6 rounded-xl border border-zinc-800 shadow-2xl">
                        <div className="md:col-span-2">
                            <input 
                                type="text" 
                                placeholder="தேடல் சொல் (எ.கா: News 2023)..." 
                                className="w-full bg-zinc-800 p-3 rounded-lg outline-none focus:ring-1 ring-red-500"
                                value={query}
                                onChange={(e) => setQuery(e.target.value)}
                            />
                        </div>
                        <div className="flex flex-col gap-1">
                            <label className="text-[10px] text-zinc-500">FROM DATE</label>
                            <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} className="bg-zinc-800 p-3 rounded-lg outline-none" />
                        </div>
                        <div className="flex flex-col gap-1">
                            <label className="text-[10px] text-zinc-500">TO DATE</label>
                            <input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} className="bg-zinc-800 p-3 rounded-lg outline-none" />
                        </div>
                        
                        <button className="md:col-span-2 bg-red-600 p-3 rounded-lg font-bold flex justify-center items-center gap-2 hover:bg-red-700 transition-colors mt-2">
                            {loading ? <Icons.Loader /> : "FIND VIDEOS"}
                        </button>
                    </form>

                    {error && <div className="mt-4 p-4 bg-red-900/20 border border-red-900/50 text-red-400 rounded-lg text-sm">{error}</div>}

                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 mt-10 mb-20">
                        {results.map(v => (
                            <div key={v.id} className="bg-zinc-900 rounded-xl overflow-hidden border border-zinc-800 hover:border-red-500/50 transition-all group">
                                <div className="relative aspect-video overflow-hidden">
                                    <img src={v.thumbnail} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
                                    <div className="absolute bottom-2 right-2 bg-black/80 text-[10px] px-2 py-1 rounded">
                                        {v.publishedAt.split('T')[0]}
                                    </div>
                                </div>
                                <div className="p-4">
                                    <h3 className="text-sm font-semibold line-clamp-2 mb-3 h-10">{v.title}</h3>
                                    <a href={`https://www.youtube.com/watch?v=${v.id}`} target="_blank" className="text-xs text-red-500 font-bold flex items-center gap-1 hover:underline">
                                        WATCH ON YOUTUBE ➔
                                    </a>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

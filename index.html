<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube History Finder Bro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [backendUrl, setBackendUrl] = useState(localStorage.getItem('saved_yt_url') || '');
            const [query, setQuery] = useState('');
            const [lang, setLang] = useState('ta');
            const [country, setCountry] = useState('IN');
            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');
            const [results, setResults] = useState([]);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [urlValid, setUrlValid] = useState(false);

            useEffect(() => {
                localStorage.setItem('saved_yt_url', backendUrl);
                // Test URL when it changes
                if (backendUrl) {
                    testBackendUrl();
                }
            }, [backendUrl]);

            const testBackendUrl = async () => {
                try {
                    const cleanUrl = backendUrl.replace(/\/$/, "");
                    const response = await fetch(`${cleanUrl}/`, { mode: 'cors' });
                    if (response.ok) {
                        setUrlValid(true);
                        setError(null);
                    } else {
                        setUrlValid(false);
                    }
                } catch (err) {
                    setUrlValid(false);
                }
            };

            const handleSearch = async (e) => {
                e.preventDefault();
                if (!backendUrl) {
                    setError("❌ Backend URL is required!");
                    return;
                }
                
                if (!query) {
                    setError("❌ Please enter a search query!");
                    return;
                }
                
                setLoading(true);
                setError(null);
                
                const cleanUrl = backendUrl.replace(/\/$/, "");
                const startIso = startDate ? `${startDate}T00:00:00Z` : "";
                const endIso = endDate ? `${endDate}T23:59:59Z` : "";

                try {
                    const url = `${cleanUrl}/search?q=${encodeURIComponent(query)}&lang=${lang}&country=${country}&after=${startIso}&before=${endIso}`;
                    console.log("Searching:", url);
                    
                    const response = await fetch(url, {
                        method: 'GET',
                        headers: {
                            'Content-Type': 'application/json',
                        }
                    });
                    
                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({}));
                        throw new Error(errorData.error || `Server error: ${response.status}`);
                    }
                    
                    const data = await response.json();
                    if (data.error) throw new Error(data.error);
                    
                    setResults(data);
                    if (data.length === 0) {
                        setError("No videos found for your search criteria.");
                    }
                } catch (err) {
                    console.error("Search error:", err);
                    setError(`❌ ${err.message}. Make sure you've opened the Cloudflare URL in a browser tab first and clicked "Visit Site".`);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="max-w-4xl mx-auto p-6">
                    <div className="flex items-center gap-3 mb-8">
                        <div className="bg-red-600 p-2 rounded-lg">
                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                            </svg>
                        </div>
                        <h1 className="text-2xl font-bold">YouTube Finder <span className="text-red-500">Bro</span></h1>
                    </div>

                    <div className="bg-zinc-900 p-6 rounded-xl border border-zinc-800 mb-6">
                        <label className="text-xs text-zinc-500 uppercase block mb-2">🌐 Backend URL (from Colab)</label>
                        <div className="flex gap-2">
                            <input 
                                type="text" 
                                className="flex-1 bg-black border border-zinc-700 p-3 rounded-lg text-green-400 font-mono text-sm outline-none focus:border-green-500"
                                placeholder="https://...trycloudflare.com"
                                value={backendUrl}
                                onChange={(e) => setBackendUrl(e.target.value)}
                            />
                            {backendUrl && (
                                <a href={backendUrl} target="_blank" className="bg-zinc-800 px-4 rounded-lg text-xs flex items-center hover:bg-zinc-700 transition-colors">
                                    OPEN
                                </a>
                            )}
                        </div>
                        {backendUrl && !urlValid && (
                            <p className="text-xs text-yellow-500 mt-2">
                                ⚠️ URL not responding! Open it in a new tab and click "Visit Site" first.
                            </p>
                        )}
                        {backendUrl && urlValid && (
                            <p className="text-xs text-green-500 mt-2">
                                ✅ Backend is connected and ready!
                            </p>
                        )}
                        <p className="text-[10px] text-zinc-600 mt-2">
                            💡 TIP: Copy the URL from Colab, open it in a new tab, click "Visit Site", then paste it here.
                        </p>
                    </div>

                    <form onSubmit={handleSearch} className="grid grid-cols-1 md:grid-cols-2 gap-4 bg-zinc-900 p-6 rounded-xl border border-zinc-800">
                        <div className="md:col-span-2">
                            <input 
                                type="text" 
                                placeholder="Search term (e.g., News 2023, Tamil Cinema, etc.)..." 
                                className="w-full bg-zinc-800 p-3 rounded-lg outline-none focus:ring-2 ring-red-500 text-white"
                                value={query}
                                onChange={(e) => setQuery(e.target.value)}
                                required
                            />
                        </div>
                        
                        <div>
                            <label className="text-xs text-zinc-500">Language</label>
                            <select value={lang} onChange={e => setLang(e.target.value)} className="w-full bg-zinc-800 p-3 rounded-lg outline-none mt-1">
                                <option value="ta">Tamil (தமிழ்)</option>
                                <option value="en">English</option>
                                <option value="hi">Hindi (हिन्दी)</option>
                                <option value="te">Telugu (తెలుగు)</option>
                            </select>
                        </div>
                        
                        <div>
                            <label className="text-xs text-zinc-500">Country</label>
                            <select value={country} onChange={e => setCountry(e.target.value)} className="w-full bg-zinc-800 p-3 rounded-lg outline-none mt-1">
                                <option value="IN">India</option>
                                <option value="US">United States</option>
                                <option value="UK">United Kingdom</option>
                                <option value="AU">Australia</option>
                            </select>
                        </div>
                        
                        <div>
                            <label className="text-xs text-zinc-500">Start Date</label>
                            <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} className="w-full bg-zinc-800 p-3 rounded-lg outline-none" />
                        </div>
                        
                        <div>
                            <label className="text-xs text-zinc-500">End Date</label>
                            <input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} className="w-full bg-zinc-800 p-3 rounded-lg outline-none" />
                        </div>
                        
                        <button 
                            type="submit"
                            disabled={loading || !urlValid}
                            className="md:col-span-2 bg-red-600 p-3 rounded-lg font-bold flex justify-center items-center gap-2 hover:bg-red-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                        >
                            {loading ? (
                                <>
                                    <svg className="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                        <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                        <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                    </svg>
                                    SEARCHING...
                                </>
                            ) : "🔍 FIND VIDEOS"}
                        </button>
                    </form>

                    {error && (
                        <div className="mt-4 p-4 bg-red-900/20 border border-red-900/50 text-red-400 rounded-lg text-sm">
                            {error}
                        </div>
                    )}

                    {results.length > 0 && (
                        <div className="mt-8">
                            <h2 className="text-xl font-bold mb-4">📺 Found {results.length} Videos</h2>
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-20">
                                {results.map(v => (
                                    <div key={v.id} className="bg-zinc-900 rounded-xl overflow-hidden border border-zinc-800 hover:border-red-500/50 transition-all group">
                                        <div className="relative aspect-video overflow-hidden">
                                            <img src={v.thumbnail} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
                                            <div className="absolute bottom-2 right-2 bg-black/80 text-[10px] px-2 py-1 rounded">
                                                {v.publishedAt.split('T')[0]}
                                            </div>
                                        </div>
                                        <div className="p-4">
                                            <h3 className="text-sm font-semibold line-clamp-2 mb-2">{v.title}</h3>
                                            <p className="text-xs text-zinc-500 mb-3">{v.channel}</p>
                                            <a href={`https://www.youtube.com/watch?v=${v.id}`} target="_blank" className="text-xs text-red-500 font-bold flex items-center gap-1 hover:underline">
                                                WATCH ON YOUTUBE →
                                            </a>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
